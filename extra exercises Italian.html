<!DOCTYPE html>

    <head>

        <title>Упражнения для тренировки</title>
        <script src="js/third_lang_book.js"></script>

        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%; 
                width: 100%;

            } 
            
            body {
            user-select: none;
            background-image: url(translucent-image\ 25\ Rome\ \(1\).png) ;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
                display: flex; /* Делаем body flex-контейнером для центрирования дочернего блока */
                justify-content: center; /* Центрируем по горизонтали */
                align-items: center;     /* Центрируем по вертикали */
                font-family: Georgia, 'Times New Roman', Times, serif, sans-serif;
            }
        
            h1 {
                position: fixed;
                width: 100%;
                text-align: center;
                top: 0;
                color: rgb(27,75,99);
                font-style: oblique;
                margin: 0;
                padding: 15px 0;
                box-sizing: border-box;        

            }
            

            .container {
                text-align: center;
                margin: 0 auto;
                max-width: 100%;
                display: flex;           /* Включаем flexbox */
                flex-wrap: wrap;         /* Разрешаем перенос на новую строку */
                justify-content: center; /* Центрируем по горизонтали */
                gap: 20px;               /* Расстояние между панелями */
                align-items: flex-start; /* Выравниваем по верхнему краю */

            }

            .navig-links {
            display: flex;
        justify-content: center;
        align-items: center;
        position: fixed;
        bottom: 50px;
        left: 0;
        right: 0; /* растягиваем на всю ширину */
        
        background-color: rgb(210,232,242, 0.5);
        
        padding: 10px 20px;
        margin-bottom: 30px;
}

        .navig-links a {
         margin: 0 20px; /* добавляем отступы между ссылками */
}

        .panel {
                background-color: rgb(210,232,242);
                color: rgb(27,75,99);
                padding: 15px 30px;
                text-align: center;
                border-radius: 15px;
                font-family: Georgia, 'Times New Roman', Times, serif;
                font-size: 16pt;
                font-style: italic;
                margin: 25px;
                
                
            }

            footer {
        position: fixed; /* Фиксируем относительно окна браузера */
        bottom: 0; /* Прижимаем к низу */
        left: 0; /* От левого края */
        width: 100%; /* На всю ширину */
        text-align: center;
        color: white;
        padding: 1px 0;
        background-color: rgba(0,0,0,0.3);
        margin: 0;
        font-size: 14pt;
        
        }
        
        
        
        
        </style>

            <div class="panel-body">
                <button class="excercise-btn" id="exBtn">Упражнение 1</button></div>
            </div>
        
            


        </div>

        
        
        <div class="navig-links"> 
        <a href="index.html">Вернуться на главную страницу</a></div>
